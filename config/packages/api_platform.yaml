api_platform:
    title: MotoGP API
    version: 1.0.0
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
        pagination_enabled: true
        pagination_items_per_page: 20
        pagination_maximum_items_per_page: 50
        pagination_client_items_per_page: true